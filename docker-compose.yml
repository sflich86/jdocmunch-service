version: "3.8"

services:
  jdocmunch:
    image: jdocmunch-service:latest
    volumes:
      - jdocmunch_data:/root/.local/share/jdocmunch
      - jdocmunch_books:/app/books
    environment:
      - PORT=3000
      - NODE_ENV=production
      - GEMINI_API_KEY=AIzaSyArwwh72NTgOYDsSqMx_6HFfMMPO9L_Wjc
      - GOOGLE_API_KEY=AIzaSyArwwh72NTgOYDsSqMx_6HFfMMPO9L_Wjc
      - JDOCMUNCH_EMBEDDING_PROVIDER=gemini
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5' 
          memory: 1G
      labels:
        - traefik.enable=true
        - traefik.http.routers.jdocmunch.rule=Host(`ssjdocmunchss.odontolab.co`)
        - traefik.http.routers.jdocmunch.service=jdocmunch
        - traefik.http.routers.jdocmunch.entrypoints=websecure
        - traefik.http.routers.jdocmunch.tls.certresolver=le
        - traefik.http.routers.jdocmunch.tls=true
        - traefik.http.services.jdocmunch.loadbalancer.server.port=3000
    networks:
      - traefik_public
      - general_network

networks:
  traefik_public:
    external: true
  general_network:
    external: true

volumes:
  jdocmunch_data: {}
  jdocmunch_books: {}
