services:
  jdocmunch:
    build: .
    image: jdocmunch-service:latest
    container_name: jdocmunch-service
    restart: always
    volumes:
      - jdocmunch_data:/root/.local/share/jdocmunch
      - ./.env:/app/.env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - JDOCMUNCH_EMBEDDING_PROVIDER=gemini
    networks:
      - traefik_public
      - general_network

networks:
  traefik_public:
    external: true
  general_network:
    external: true

volumes:
  jdocmunch_data: {}
