services:
  jdocmunch:
    build: .
    image: ghcr.io/sflich86/jdocmunch-service:latest
    volumes:
      - jdocmunch_data:/root/.local/share/jdocmunch
      - jdocmunch_books:/app/books
      - /opt/jdocmunch-service/.env:/app/.env
    environment:
      PORT: 3000
      NODE_ENV: production
      JDOCMUNCH_EMBEDDING_PROVIDER: ${JDOCMUNCH_EMBEDDING_PROVIDER:-}
      GEMINI_EMBEDDING_MODEL: models/gemini-embedding-001
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBED_KEY_1: ${OPENAI_EMBED_KEY_1:-}
      OPENAI_EMBED_KEY_2: ${OPENAI_EMBED_KEY_2:-}
      GEMINI_EMBED_KEY_1: ${GEMINI_EMBED_KEY_1:-}
      GEMINI_EMBED_KEY_2: ${GEMINI_EMBED_KEY_2:-}
      GEMINI_EMBED_FALLBACK_KEY: ${GEMINI_EMBED_FALLBACK_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_KEY_FALLBACK: ${GEMINI_API_KEY_FALLBACK:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_API_KEY_FALLBACK: ${GOOGLE_API_KEY_FALLBACK:-}
      JDOCMUNCH_EMBED_QUERY_MAX_RETRIES: ${JDOCMUNCH_EMBED_QUERY_MAX_RETRIES:-}
      JDOCMUNCH_EMBED_DOCUMENT_MAX_RETRIES: ${JDOCMUNCH_EMBED_DOCUMENT_MAX_RETRIES:-}
      JDOCMUNCH_EMBED_RECOVERY_MAX_RETRIES: ${JDOCMUNCH_EMBED_RECOVERY_MAX_RETRIES:-}
      JDOCMUNCH_EMBED_CHECKPOINT_EVERY: ${JDOCMUNCH_EMBED_CHECKPOINT_EVERY:-}
      DOC_INDEX_PATH: /root/.local/share/jdocmunch/doc-index
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.50'
          memory: 1G
      labels:
        - traefik.enable=true
        - traefik.http.routers.ssjdocmunchss.rule=Host(`ssjdocmunchss.odontolab.co`)
        - traefik.http.routers.ssjdocmunchss.service=ssjdocmunchss
        - traefik.http.routers.ssjdocmunchss.entrypoints=websecure
        - traefik.http.routers.ssjdocmunchss.tls.certresolver=le
        - traefik.http.routers.ssjdocmunchss.tls=true
        - traefik.http.services.ssjdocmunchss.loadbalancer.server.port=3000
        - traefik.docker.network=traefik_public
    networks:
      - traefik_public
      - general_network

networks:
  traefik_public:
    external: true
  general_network:
    external: true

volumes:
  jdocmunch_data: {}
  jdocmunch_books: {}
