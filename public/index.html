<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jDocMunch Explorer - Nervio Vago</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #22d3ee;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container { width: 100%; max-width: 800px; }

        header { text-align: center; margin-bottom: 2rem; }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .search-box {
            display: flex;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 0.25rem;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.75rem 1rem;
            font-size: 1.1rem;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .stats {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .latency-badge {
            color: var(--accent);
            font-weight: bold;
            display: inline-block;
            background: rgba(34, 211, 238, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .breakdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        #results {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .ai-answer-card {
            background: linear-gradient(135deg, #1e1b4b 0%, #1e293b 100%);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--primary);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            animation: fadeIn 0.5s ease;
        }

        .loading {
            text-align: center;
            margin: 2rem 0;
            display: none;
            color: var(--accent);
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>jDocMunch Explorer</h1>
            <p style="color: var(--text-dim)">Exploración de "Estimula tu nervio vago"</p>
        </header>
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="query" placeholder="Escribe tu pregunta..." onkeypress="if(event.key==='Enter') execute()">
                <button onclick="execute()">Consultar</button>
            </div>

            <div class="stats" id="statsArea" style="display: none;">
                <div class="breakdown-item" style="border: 1px solid var(--accent)">
                    <span style="font-size: 0.7rem">TIEMPO TOTAL</span>
                    <span id="statTotal" class="latency-badge" style="color: var(--success)">0ms</span>
                </div>
                <div class="breakdown-item">
                    <span style="font-size: 0.7rem">CONTEXTO USADO</span>
                    <span id="statContext" class="latency-badge">0 secciones</span>
                </div>
            </div>
        </div>

        <div class="loading" id="loader">Consultando el motor jDocMunch...</div>

        <div id="results"></div>
    </div>
    <script>
        async function execute() {
            const query = document.getElementById('query').value;
            if (!query) return;

            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            const statsArea = document.getElementById('statsArea');
            
            resultsDiv.innerHTML = '';
            loader.style.display = 'block';
            statsArea.style.display = 'none';

            const startTime = Date.now();

            try {
                const response = await fetch(`/ask?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                const totalTime = Date.now() - startTime;

                loader.style.display = 'none';
                statsArea.style.display = 'flex';

                document.getElementById('statTotal').textContent = totalTime + 'ms';
                document.getElementById('statContext').textContent = (data.context_used || 0) + ' secciones';

                if (data.error) {
                    resultsDiv.innerHTML = `<p style="color: #ef4444">${data.error}: ${data.details || ''}</p>`;
                    return;
                }

                const card = document.createElement('div');
                card.className = 'ai-answer-card';
                card.innerHTML = `
                    <div style="font-size: 0.8rem; color: var(--accent); margin-bottom: 1rem">RESPUESTA GENERADA (${data.context_used || 0} secciones de contexto)</div>
                    <div style="line-height: 1.8">${data.answer || 'Sin respuesta'}</div>
                `;
                resultsDiv.appendChild(card);
            } catch (err) {
                loader.style.display = 'none';
                resultsDiv.innerHTML = '<p style="color: #ef4444">Error de conexión con el servidor.</p>';
            }
        }
    </script>
</body>
</html>
