<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jDocMunch Explorer - Nervio Vago</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #22d3ee;
            --success: #10b981;
            --orange: #f97316;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container { width: 100%; max-width: 850px; }
        header { text-align: center; margin-bottom: 2rem; }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .mode-selector {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .mode-chip {
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid var(--primary);
            color: var(--primary);
            transition: all 0.2s;
            user-select: none;
        }

        .mode-chip.active {
            background: var(--primary);
            color: white;
        }

        .mode-chip.chunks-chip { border-color: var(--orange); color: var(--orange); }
        .mode-chip.chunks-chip.active { background: var(--orange); color: white; }

        .search-box {
            display: flex;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 0.25rem;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.75rem 1rem;
            font-size: 1.1rem;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .stats {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .latency-badge {
            color: var(--accent);
            font-weight: bold;
            background: rgba(34, 211, 238, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .breakdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        #results {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .ai-answer-card {
            background: linear-gradient(135deg, #1e1b4b 0%, #1e293b 100%);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--primary);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            animation: fadeIn 0.5s ease;
            line-height: 1.8;
        }

        .chunk-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            animation: fadeIn 0.3s ease;
        }

        .chunk-card:hover { border-color: var(--orange); }

        .chunk-title {
            color: var(--orange);
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }

        .chunk-summary {
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 0.75rem;
            font-style: italic;
        }

        .chunk-content {
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.82rem;
            color: #a1a1aa;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .chunk-badge {
            display: inline-block;
            background: rgba(249, 115, 22, 0.15);
            color: var(--orange);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .loading {
            text-align: center;
            margin: 2rem 0;
            display: none;
            color: var(--accent);
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>jDocMunch Explorer</h1>
            <p style="color: var(--text-dim)">Exploración semántica de "Estimula tu nervio vago"</p>
        </header>
        <div class="search-container">
            <div class="mode-selector">
                <div class="mode-chip active" id="modeAsk" onclick="setMode('ask')"> 🧠 Respuesta AI</div>
                <div class="mode-chip chunks-chip" id="modeSearch" onclick="setMode('search')"> 🧩 Chunks Semánticos</div>
            </div>
            
            <div class="search-box">
                <input type="text" id="query" placeholder="Escribe tu pregunta..." onkeypress="if(event.key==='Enter') execute()">
                <button onclick="execute()">Consultar</button>
            </div>

            <div class="stats" id="statsArea" style="display: none;"></div>
        </div>

        <div class="loading" id="loader">Consultando el motor jDocMunch...</div>
        <div id="results"></div>
    </div>
    <script>
        let currentMode = 'ask';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-chip').forEach(c => c.classList.remove('active'));
            document.getElementById(`mode${mode.charAt(0).toUpperCase() + mode.slice(1)}`).classList.add('active');
            document.getElementById('results').innerHTML = '';
            document.getElementById('statsArea').style.display = 'none';
        }

        function renderStats(breakdown, totalTime, extra) {
            const area = document.getElementById('statsArea');
            let html = '';
            if (breakdown) {
                if (breakdown.search_ms != null) html += `<div class="breakdown-item"><span style="font-size:0.7rem">BÚSQUEDA</span><span class="latency-badge">${breakdown.search_ms}ms</span></div>`;
                if (breakdown.retrieval_ms != null) html += `<div class="breakdown-item"><span style="font-size:0.7rem">RECUPERACIÓN</span><span class="latency-badge">${breakdown.retrieval_ms}ms</span></div>`;
                if (breakdown.synthesis_ms != null) html += `<div class="breakdown-item"><span style="font-size:0.7rem">SÍNTESIS AI</span><span class="latency-badge">${breakdown.synthesis_ms}ms</span></div>`;
            }
            html += `<div class="breakdown-item" style="border:1px solid var(--accent)"><span style="font-size:0.7rem">TOTAL E2E</span><span class="latency-badge" style="color:var(--success)">${totalTime}ms</span></div>`;
            if (extra) html += extra;
            area.innerHTML = html;
            area.style.display = 'flex';
        }

        async function execute() {
            const query = document.getElementById('query').value;
            if (!query) return;

            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            
            resultsDiv.innerHTML = '';
            loader.style.display = 'block';
            document.getElementById('statsArea').style.display = 'none';

            const startTime = Date.now();
            const isAsk = currentMode === 'ask';
            const endpoint = isAsk ? '/ask' : '/api/jdocmunch/search';
            const method = isAsk ? 'GET' : 'POST';

            try {
                let response;
                if (isAsk) {
                    response = await fetch(`${endpoint}?q=${encodeURIComponent(query)}&user_id=admin`);
                } else {
                    response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: query, user_id: 'admin' })
                    });
                }
                
                const data = await response.json();
                const totalTime = Date.now() - startTime;
                loader.style.display = 'none';

                if (data.error) {
                    resultsDiv.innerHTML = `<p style="color:#ef4444">${data.error}: ${data.details || ''}</p>`;
                    return;
                }

                if (currentMode === 'search') {
                    // Chunks mode
                    renderStats(data.breakdown, totalTime, `<div class="breakdown-item"><span style="font-size:0.7rem">CHUNKS</span><span class="latency-badge" style="color:var(--orange)">${data.total_chunks || 0}</span></div>`);

                    if (data.results && data.results.length > 0) {
                        data.results.forEach((chunk, i) => {
                            const card = document.createElement('div');
                            card.className = 'chunk-card';
                            card.innerHTML = `
                                <span class="chunk-badge">CHUNK #${i + 1}${chunk.score ? ' • score: ' + chunk.score.toFixed(3) : ''}</span>
                                <div class="chunk-title">${chunk.title}</div>
                                ${chunk.summary ? `<div class="chunk-summary">"…${chunk.summary}…"</div>` : ''}
                                <div class="chunk-content">${chunk.content}</div>
                            `;
                            resultsDiv.appendChild(card);
                        });
                    } else {
                        resultsDiv.innerHTML = '<p style="color:var(--text-dim)">No se encontraron chunks relevantes.</p>';
                    }
                } else {
                    // AI mode
                    renderStats(data.breakdown, totalTime);
                    const card = document.createElement('div');
                    card.className = 'ai-answer-card';
                    card.innerHTML = `
                        <div style="font-size:0.8rem;color:var(--accent);margin-bottom:1rem">RESPUESTA GENERADA (${data.context_used || 0} secciones de contexto)</div>
                        <div>${data.answer || 'Sin respuesta'}</div>
                    `;
                    resultsDiv.appendChild(card);
                }
            } catch (err) {
                loader.style.display = 'none';
                resultsDiv.innerHTML = '<p style="color:#ef4444">Error de conexión con el servidor.</p>';
            }
        }
    </script>
</body>
</html>
